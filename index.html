                                    {[["সোম–শুক্র", "৩ ঘণ্টার রুটিন অনুসরণ করুন"], ["শনিবার", "Project building — নতুন concept নয়"], ["রবিবার", "Revision + GitHub push + পরের সপ্তাহ plan"]].map(([d, r], i) => (
                                        <div key={i} style={{ display: "flex", gap: 10, marginBottom: 8 }}>
                                            <span style={{ background: "#fef3c7", color: "#92400e", borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>{d}</span>
                                            <span style={{ color: "#78350f", fontSize: 13 }}>{r}</span>
                                        </div>
                                    ))}
                                </div>
                                <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 12, padding: 16 }}>
                                    <div style={{ fontWeight: 800, color: "#991b1b", marginBottom: 8 }}>⚠️ এই ভুলগুলো করবেন না</div>
                                    {["B-13 module দেখে নোট না নিয়ে এগিয়ে যাবেন না", "Error দেখলে সাথে সাথে AI-তে না গিয়ে ৩০ মিনিট নিজে চেষ্টা করুন", "প্রতিদিন GitHub push — ১৫ মিনিটেও হলেও", "১৪তম ব্যাচে ভর্তির চিন্তা বাদ দিন — এটাই আপনার সেরা পথ"].map((r, i) => (
                                        <div key={i} style={{ color: "#7f1d1d", fontSize: 13, marginBottom: 5 }}>• {r}</div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {tab === "new" && (
                            <div>
                                <div style={{ background: "#fff", borderRadius: 14, padding: 20, marginBottom: 14, boxShadow: "0 1px 8px rgba(0,0,0,0.07)" }}>
                                    <h2 style={{ margin: "0 0 4px", fontSize: 17, color: "#1e293b" }}>⭐ B-13-তে নেই এমন NEW স্কিল</h2>
                                    <p style={{ margin: "0 0 16px", color: "#64748b", fontSize: 12 }}>এগুলো B-14-তে যোগ হয়েছে। নিজে শিখতে হবে — সব ফ্রি সোর্স আছে।</p>
                                    {newSkills.map((s, i) => (
                                        <div key={i} style={{ background: "#f8fafc", borderRadius: 10, padding: "12px 14px", marginBottom: 10, borderLeft: "4px solid #be185d" }}>
                                            <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 6, marginBottom: 6 }}>
                                                <span style={{ fontWeight: 800, color: "#1e293b", fontSize: 14 }}>{s.name}</span>
                                                <span style={{ background: "#fdf2f8", color: "#be185d", borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>{s.where}</span>
                                            </div>
                                            <div style={{ background: "#eff6ff", borderRadius: 6, padding: "5px 10px", marginBottom: 5 }}>
                                                <span style={{ fontWeight: 700, color: "#1d4ed8", fontSize: 11 }}>📚 </span>
                                                <span style={{ color: "#1e40af", fontSize: 11 }}>{s.source}</span>
                                            </div>
                                            <div style={{ color: "#64748b", fontSize: 12 }}>💡 {s.note}</div>
                                        </div>
                                    ))}
                                </div>
                                <div style={{ background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 12, padding: 16 }}>
                                    <div style={{ fontWeight: 800, color: "#14532d", marginBottom: 8 }}>✅ মূল কথা</div>
                                    <div style={{ color: "#166534", fontSize: 13, lineHeight: 1.7 }}>
                                        B-13-এর ১০ Milestone সম্পূর্ণ করুন + উপরের ৯টা NEW স্কিল নিজে শিখুন।<br />
                                        ৫৫০০ টাকার বিপরীতে আর ৫৫০০ টাকা খরচের কোনো দরকার নেই।<br />
                                        সব ফ্রি সোর্স দিয়েই market-ready হওয়া সম্পূর্ণ সম্ভব।
                                    </div>
                                </div>
                            </div>
                        )}
                        {tab === "roadmap" && (
                            <div>
                                {phases.map((phase, pi) => (
                                    <div key={phase.id} style={{ background: "#fff", borderRadius: 14, marginBottom: 12, overflow: "hidden", boxShadow: "0 1px 8px rgba(0,0,0,0.07)" }}>
                                        <button onClick={() => setOpenPhase(openPhase === pi ? null : pi)} style={{ width: "100%", background: phase.bg, border: `1.5px solid ${phase.border}`, borderRadius: openPhase === pi ? "13px 13px 0 0" : 13, padding: "14px 16px", cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                                            <div style={{ flex: 1 }}>
                                                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 3 }}>
                                                    <span style={{ background: phase.color, color: "#fff", borderRadius: 7, padding: "2px 10px", fontSize: 11, fontWeight: 800 }}>{phase.phase}</span>
                                                    <span style={{ color: "#64748b", fontSize: 11 }}>{phase.duration}</span>
                                                </div>
                                                <div style={{ fontWeight: 900, fontSize: 14, color: "#1e293b" }}>{phase.title}</div>
                                                <div style={{ fontSize: 11, color: phase.color, marginTop: 3, fontWeight: 600 }}>{phase.note}</div>
                                            </div>
                                            <span style={{ fontSize: 16, color: phase.color, flexShrink: 0, marginLeft: 8, marginTop: 2 }}>{openPhase === pi ? "▲" : "▼"}</span>
                                        </button>
                                        {openPhase === pi && phase.weeks.map((week) => (
                                            <div key={week.id} style={{ borderTop: `1px solid ${phase.border}` }}>
                                                <button onClick={() => toggleWeek(week.id)} style={{ width: "100%", background: "transparent", border: "none", padding: "12px 16px", cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                                                    <div>
                                                        <div style={{ fontWeight: 800, color: phase.color, fontSize: 13 }}>{week.label}</div>
                                                        {week.parallel && <div style={{ fontSize: 11, color: "#7c3aed", background: "#f5f3ff", borderRadius: 6, padding: "2px 8px", marginTop: 4, display: "inline-block" }}>{week.parallel}</div>}
                                                    </div>
                                                    <span style={{ color: "#94a3b8", fontSize: 13 }}>{openWeek[week.id] ? "▲" : "▼"}</span>
                                                </button>
                                                {openWeek[week.id] && (
                                                    <div style={{ padding: "0 14px 14px" }}>
                                                        {week.topics.map((topic) => (
                                                            <div key={topic.id} style={{ background: done[topic.id] ? "#f0fdf4" : "#f8fafc", borderRadius: 12, padding: 14, marginBottom: 10, border: `1px solid ${done[topic.id] ? "#86efac" : phase.border}`, transition: "all 0.2s" }}>
                                                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
                                                                    <div style={{ fontWeight: 900, fontSize: 14, color: "#1e293b", flex: 1 }}>{topic.name}</div>
                                                                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                                                        {topic.time && <span style={{ background: "#e0f2fe", color: "#0369a1", borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>⏱ {topic.time}</span>}
                                                                        <button onClick={() => toggleDone(topic.id)} style={{ background: done[topic.id] ? "#16a34a" : "#e2e8f0", color: done[topic.id] ? "#fff" : "#64748b", border: "none", borderRadius: 8, padding: "4px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                                                                            {done[topic.id] ? "✓ Done" : "Mark Done"}
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                                <div style={{ background: "#eff6ff", borderRadius: 8, padding: "7px 11px", marginBottom: 10 }}>
                                                                    <span style={{ fontWeight: 800, color: "#1d4ed8", fontSize: 11 }}>📚 সোর্স: </span>
                                                                    <span style={{ color: "#1e40af", fontSize: 11 }}>{topic.source}</span>
                                                                </div>
                                                                <div style={{ marginBottom: topic.skip?.length > 0 ? 8 : 0 }}>
                                                                    <div style={{ fontWeight: 800, color: "#059669", fontSize: 12, marginBottom: 5 }}>✅ যা শিখবেন:</div>
                                                                    {topic.learn.map((item, i) => (
                                                                        <div key={i} style={{ fontSize: 12, color: "#1e293b", marginBottom: 3, paddingLeft: item.startsWith(" →") ? 14 : 0, lineHeight: 1.5 }}>
                                                                            {item.startsWith(" →") ? item : `• ${item}`}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                                {topic.skip?.length > 0 && (
                                                                    <div>
                                                                        <div style={{ fontWeight: 800, color: "#dc2626", fontSize: 12, marginBottom: 5 }}>🚫 এখন skip:</div>
                                                                        {topic.skip.map((item, i) => <div key={i} style={{ fontSize: 12, color: "#94a3b8", marginBottom: 3 }}>• {item}</div>)}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        ))}
                                                        {week.project && (
                                                            <div style={{ background: phase.bg, border: `2px dashed ${phase.color}`, borderRadius: 10, padding: 12 }}>
                                                                <div style={{ fontSize: 13, color: "#1e293b", fontWeight: 600, lineHeight: 1.5 }}>{week.project}</div>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                ))}
                                <div style={{ background: "linear-gradient(135deg,#0f172a,#312e81)", borderRadius: 14, padding: 20, color: "#fff", textAlign: "center" }}>
                                    <div style={{ fontSize: 20, marginBottom: 8 }}>🎯</div>
                                    <div style={{ fontWeight: 900, fontSize: 15, marginBottom: 8, color: "#e0e7ff" }}>সবচেয়ে গুরুত্বপূর্ণ নিয়ম</div>
                                    <div style={{ color: "#a5b4fc", fontSize: 12, lineHeight: 1.8 }}>
                                        প্রতিটা ফেজের project শেষ না করে পরের ফেজে যাবেন না।<br />
                                        B-13 module + NEW স্কিলের ফ্রি সোর্স — দুটো মিলিয়ে চালান।<br />
                                        প্রতিদিন GitHub-এ push করুন। Consistency-ই সাফল্যের চাবিকাঠি।
                                    </div>
                                </div>
                            </div>
                        )}
                        {tab === "comm" && (
                            <div>
                                <div style={{ background: "#fff", borderRadius: 14, padding: 20, marginBottom: 14, boxShadow: "0 1px 8px rgba(0,0,0,0.07)" }}>
                                    <h2 style={{ margin: "0 0 4px", fontSize: 17, color: "#1e293b" }}>🗣 কমিউনিকেশন স্কিল রোডম্যাপ</h2>
                                    <p style={{ margin: "0 0 16px", color: "#64748b", fontSize: 12 }}>টেকনিক্যাল স্কিলের পাশাপাশি — সপ্তাহে ৩–৪ দিন, ১৫–২০ মিনিট করে</p>
                                    {commSkills[0].items.map((item, i) => (
                                        <div key={i} style={{ background: "#f8fafc", borderRadius: 10, padding: "12px 14px", marginBottom: 10, borderLeft: "4px solid #0891b2" }}>
                                            <div style={{ fontWeight: 800, color: "#1e293b", fontSize: 14, marginBottom: 6 }}>{item.name}</div>
                                            <div style={{ background: "#eff6ff", borderRadius: 6, padding: "5px 10px", marginBottom: 6 }}>
                                                <span style={{ fontWeight: 700, color: "#1d4ed8", fontSize: 11 }}>📚 </span>
                                                {item.link ? (
                                                    <a href={item.link} target="_blank" rel="noopener noreferrer" style={{ color: "#1e40af", fontSize: 11, textDecoration: "underline" }}>{item.source}</a>
                                                ) : (
                                                    <span style={{ color: "#1e40af", fontSize: 11 }}>{item.source}</span>
                                                )}
                                            </div>
                                            <div style={{ color: "#64748b", fontSize: 12 }}>💡 {item.practice}</div>
                                        </div>
                                    ))}
                                </div>
                                <div style={{ background: "#ecfeff", border: "1px solid #a5f3fc", borderRadius: 12, padding: 16 }}>
                                    <div style={{ fontWeight: 800, color: "#155e75", marginBottom: 8 }}>✅ কেন এটা গুরুত্বপূর্ণ</div>
                                    <div style={{ color: "#0e7490", fontSize: 13, lineHeight: 1.7 }}>
                                        Interview-তে কোডিং স্কিল ভালো থাকলেও communication দুর্বল হলে আটকে যাবেন।<br />
                                        এটা আলাদা course না — existing রুটিনের সাথে integrate করুন।<br />
                                        প্রতিটা project শেষে explain করার অভ্যাস গড়ে তুললে এমনিতেই উন্নত হবে।
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
